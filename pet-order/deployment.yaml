apiVersion: apps/v1
kind: Deployment
metadata:
  name: pet-order
  namespace: pet-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pet-order
  template:
    metadata:
      labels:
        app: pet-order
    spec:
      containers:
        - name: pet-order
          image: pet-order-image:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_URL
              value: "mongodb://mongodb-service:27017"
            - name: PETSTORE1_URL
              value: "http://pet-store1-service:8000"
            - name: PETSTORE2_URL
              value: "http://pet-store2-service:8000"