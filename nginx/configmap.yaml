apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: pet-app
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
    
        map "$request_method:$http_ownerpc" $pet_store_allowed {
            ~^GET:              1;
            ~:LovesPetsL2M3n4$ 1;
            default             0;
        }

        server {
            listen 80;

            # /pet-types1[/...] → pet-store1
            location ~ ^/pet-types1 {
                if ($pet_store_allowed = 0) {
                    return 403;
                }
                rewrite ^/pet-types1(.*)$ /pet-types$1 break;
                proxy_pass http://pet-store1-service:8000;
            }

            # /pet-types2[/...] → pet-store2
            location ~ ^/pet-types2 {
                if ($pet_store_allowed = 0) {
                    return 403;
                }
                rewrite ^/pet-types2(.*)$ /pet-types$1 break;
                proxy_pass http://pet-store2-service:8000;
            }

            # /purchases → pet-order (K8s Service round-robins between replicas)
            location = /purchases {
                limit_except POST {
                    deny all;
                }
                proxy_pass http://pet-order-service:8080;
            }

            # /transactions → pet-order (auth checked at service level)
            location = /transactions {
                limit_except GET {
                    deny all;
                }
                proxy_pass http://pet-order-service:8080;
            }

            # Everything else → 403
            location / {
                return 403;
            }
        }
    }