apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: pet-app
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        server {
            listen 80;

            # GET /pet-types1[/...] → pet-store1 (rewrite strips the "1")
            location ~ ^/pet-types1 {
                limit_except GET {
                    deny all;
                }
                rewrite ^/pet-types1(.*)$ /pet-types$1 break;
                proxy_pass http://pet-store1-service:8000;
            }

            # GET /pet-types2[/...] → pet-store2 (rewrite strips the "2")
            location ~ ^/pet-types2 {
                limit_except GET {
                    deny all;
                }
                rewrite ^/pet-types2(.*)$ /pet-types$1 break;
                proxy_pass http://pet-store2-service:8000;
            }

            # POST /purchases → pet-order (K8s Service round-robins between replicas)
            location = /purchases {
                limit_except POST {
                    deny all;
                }
                proxy_pass http://pet-order-service:8080;
            }

            # GET /transactions → pet-order (auth checked at service level)
            location = /transactions {
                limit_except GET {
                    deny all;
                }
                proxy_pass http://pet-order-service:8080;
            }

            # Everything else → 403
            location / {
                return 403;
            }
        }
    }